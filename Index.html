<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Landing Page</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-200">
    <!-- Content will go here -->

    <!-- Navbar -->
    <nav
      class="sticky top-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 z-50"
    >
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="text-xl font-bold">Drolip</div>

        <!-- Desktop Links -->
        <div class="hidden md:flex items-center space-x-6">
          <a href="#" class="hover:text-blue-500">Home</a>
          <a href="#" class="hover:text-blue-500">Features</a>
          <a href="#" class="hover:text-blue-500">Pricing</a>

          <!-- Dark mode button -->
          <button
            onclick="document.documentElement.classList.toggle('dark')"
            class="px-3 py-1 border rounded"
          >
            🌙
          </button>

          <!-- CTA -->
          <a
            href="#"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
          >
            Get Started
          </a>
        </div>

        <!-- Mobile Menu Icon -->
        <button class="md:hidden text-2xl">☰</button>
      </div>
    </nav>
    <!-- STEP 2: HERO -->

    <section class="py-20 md:py-32 px-6 text-center">
      <div class="max-w-4xl mx-auto">
        <!-- Badge -->
        <div
          class="inline-block bg-indigo-100 text-indigo-700 rounded-full px-3 py-1 text-xs font-semibold mb-6"
        >
          Now in Beta
        </div>

        <!-- Headline -->
        <h1
          class="text-5xl md:text-6xl lg:text-7xl font-black leading-tight mb-6"
        >
          Build Faster With Modern Tools
        </h1>

        <!-- Subheadline -->
        <p
          class="text-lg md:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto mb-10"
        >
          Launch beautiful websites quickly using a powerful workflow and modern
          design system built for speed and flexibility.
        </p>

        <!-- CTA Buttons -->
        <div
          class="flex flex-col sm:flex-row items-center justify-center gap-4"
        >
          <!-- Primary Button -->
          <a
            href="#"
            class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition"
          >
            Get Started
          </a>

          <!-- Secondary Button -->
          <a
            href="#"
            class="border border-gray-300 dark:border-gray-600 px-6 py-3 rounded-lg font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition"
          >
            Learn More
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
